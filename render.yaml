services:
  - type: web
    runtime: static
    name: wedding-demo
    branch: feature/demo-site
    rootDir: frontend
    buildCommand: npm ci && npm run build -- --configuration=production
    staticPublishPath: ./dist/frontend/browser
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
