services:
  - type: web
    runtime: docker
    name: wedding-api
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    dockerCommand: npm run start:prod
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: FRONTEND_PUBLIC_URL
        value: https://www.ozgefatihdugun.tr
      - key: CORS_ORIGINS
        value: https://www.ozgefatihdugun.tr,https://ozgefatihdugun.tr
      - key: FRONTEND_HOST
        fromService:
          name: wedding-web
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: MEMORY_UPLOAD_MODE
        value: scheduled
      - key: MEMORY_UPLOAD_OPEN_AT
        value: 2026-09-05T20:00:00+03:00

  - type: web
    runtime: static
    name: wedding-web
    buildCommand: npm ci --prefix frontend && npm run build:render --prefix frontend
    staticPublishPath: ./frontend/dist/frontend/browser
    autoDeployTrigger: commit
    domains:
      - www.ozgefatihdugun.tr
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_HOST
        fromService:
          name: wedding-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: MEMORY_UPLOAD_MODE
        value: scheduled
      - key: MEMORY_UPLOAD_OPEN_AT
        value: 2026-09-05T20:00:00+03:00

  - type: web
    runtime: static
    name: wedding-demo
    branch: feature/demo-site
    rootDir: frontend
    buildCommand: npm ci && npm run build -- --configuration=production
    staticPublishPath: ./dist/frontend/browser
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
