services:
  - type: web
    runtime: docker
    name: wedding-api
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    dockerCommand: npm run start:prod
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-db
          property: connectionString
      - key: ADMIN_API_KEY
        generateValue: true

  - type: web
    runtime: docker
    name: wedding-web
    plan: free
    region: frankfurt
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: wedding-api
          type: web
          property: host
      - key: BACKEND_PORT
        fromService:
          name: wedding-api
          type: web
          property: port

databases:
  - name: wedding-db
    plan: free
    region: frankfurt
    databaseName: wedding_db
    user: wedding
    ipAllowList: []
