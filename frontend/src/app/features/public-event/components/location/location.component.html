@if (event) {
  <section id="location" class="location">
    <div class="location-inner">

    <div class="section-divider">Konum</div>
    <h2 class="section-title">Dugun Alanina Nasil Ulasirsiniz?</h2>
    <p class="section-subtitle">
      Demo davetiye icin mekan bilgileri ve harita on izlemesi burada gosterilir.
    </p>

    <div class="location-grid">
      <div class="venue-card">
        <h3>{{ event.venueName }}</h3>
        <a
          class="venue-address"
          [href]="mapsLinkUrl"
          target="_blank"
          rel="noopener noreferrer">
          {{ event.venueAddress }}
        </a>

        <div class="venue-date">
          <span class="venue-date-label">Tarih &amp; Saat</span>
          <span class="venue-date-value">
            {{ event.eventDate | date:'dd MMMM yyyy, HH:mm' }}
          </span>
        </div>

        <a
          class="map-btn"
          [href]="mapsLinkUrl"
          target="_blank"
          rel="noopener noreferrer">
          Yol Tarifi Al
        </a>
      </div>

      <div class="map-wrapper">
        @if (mapEmbedUrl) {
          <iframe
            [src]="mapEmbedUrl"
            tabindex="0"
            width="100%"
            height="100%"
            style="border:0;"
            allowfullscreen
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            title="Mekan haritasi">
          </iframe>
        }
      </div>
    </div>

    <button
      class="scroll-cue"
      type="button"
      aria-label="Katilim bolumune gec"
      (click)="scrollToRsvp()">
      <span>Asagi kaydirin</span>
      <b aria-hidden="true">&darr;</b>
    </button>

    </div>
  </section>
}
