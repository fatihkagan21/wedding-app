<section id="photos" class="photo-upload">
  <div class="photo-upload-inner">
    <div class="camera-mark" aria-hidden="true">📷</div>
    <div class="section-divider">Fotoğraflar</div>
    <h2 class="section-title">Anılarınızı Bizimle Paylaşın</h2>
    <p class="section-subtitle">
      Bu güzel günden yakaladığınız kareleri seçin, anılarımızı birlikte çoğaltalım.
    </p>

    <div class="upload-card">
      <label class="file-picker" for="photo-input">
        <span class="file-picker-title">Fotoğraf seçin</span>
        <span class="file-picker-hint">JPEG, PNG, WebP, HEIC veya HEIF · En fazla 100 MB</span>
      </label>
      <input
        #photoInput
        id="photo-input"
        class="file-input"
        type="file"
        accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
        multiple
        [disabled]="uploading"
        (change)="onFileSelected($event)">

      @if (selectedFiles.length > 0) {
        <p class="selection-count" aria-live="polite">
          {{ selectedFiles.length }} fotoğraf seçildi
        </p>
      }

      <button
        class="upload-button"
        type="button"
        [disabled]="selectedFiles.length === 0 || uploading"
        (click)="upload(photoInput)">
        @if (uploading) {
          <span class="spinner" aria-hidden="true"></span>
          Yükleniyor...
        } @else {
          Fotoğrafları Yükle
        }
      </button>

      @if (errorMessage) {
        <p class="message error-message" role="alert">{{ errorMessage }}</p>
      }

      @if (successMessage) {
        <p class="message success-message" role="status">{{ successMessage }}</p>
      }
    </div>
  </div>
</section>
